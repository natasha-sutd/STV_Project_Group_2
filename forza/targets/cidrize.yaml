name: cidrize

# commands
buggy_cmd: 
  windows: ["../cidrize-runner-main/bin/win-cidrize-runner.exe", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
  linux: ["./bin/linux-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
  mac: ["../cidrize-runner-main/bin/mac-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
buggy_cwd: "../../cidrize-runner-main"

reference_cmd:
  windows: ["python", "cidrize.py", "{input}"]
  linux: ["python3", "cidrize.py", "{input}"]
  mac: ["python3", "cidrize.py", "{input}"]
reference_cwd: "../../cidrize-runner-main/cidrize"

# input
input_mode: arg
input:
  type: sequence
  parts:
    - type: sequence
      count: 4
      separator: "."
      element: { type: int, min: 0, max: 255 }
    - type: literal
      value: "/"
    - type: int
      min: 0
      max: 32
parallel_workers: 4

# special bug keywords
bug_keywords:
  - "CidrizeError"

# differential output comparison
output_pattern: "IPNetwork('{value}')"

# coverage
coverage_enabled: false
tracking_mode: code_execution
blackbox_instrumentation:
  enabled: true
  kind: afl_showmap
  kind_windows: frida_stalker
  frida_config:
    target_module: "win-cidrize-runner.exe"
    use_call_summary: true
    flush_event_count: 4096
    capture_target_output: false
    parallel_with_buggy: true
    parallel_with_reference: true
    attach_retries: 3
    attach_retry_delay_ms: 20
    fail_fast_on_setup_error: true
    arg_null_policy: escape
    arg_null_replacement: "\\x00"
    exclude_modules:
      - "ntdll.dll"
      - "kernel32.dll"
      - "kernelbase.dll"
      - "ucrtbase.dll"
  cmd:
    windows:
      ["wsl", "--cd", "{buggy_cwd_wsl}", "afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/linux-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
    linux:
      ["afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/linux-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
    mac:
      ["afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/mac-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}", "--raise-errors"]
  timeout: 20
  timeout_windows: 60
