name: cidrize

# commands
buggy_cmd: 
  windows: ["./win-cidrize-runner.exe", "--func", "cidrize", "--ipstr", "{input}"]
  mac: ["./mac-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}"]
buggy_cwd: "../../cidrize-runner-main/bin"

reference_cmd:
  windows: ["python", "cidrize.py", "{input}"]
  mac: ["python3", "cidrize.py", "{input}"]
reference_cwd: "../../cidrize-runner-main/cidrize"

# input
input_mode: arg
input:
  type: sequence
  parts:
    - type: sequence
      count: 4
      separator: "."
      element: { type: int, min: 0, max: 255 }
    - type: literal
      value: "/"
    - type: int
      min: 0
      max: 32
seeds_path: "../inputs/cidrize/seeds.txt"
seed_count: 30

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "bug has been triggered"
  - "syntactic"
  - "functional"
  - "Traceback"
  - "Error"
  - "invalidity bug"
  - "InvalidCidrFormatError"
  - "AddrFormatError"
  - "Traceback (most recent call last)"

# differential output comparison
output_pattern: "IPNetwork('{value}')"

# coverage
coverage_enabled: false
tracking_mode: behavioral
