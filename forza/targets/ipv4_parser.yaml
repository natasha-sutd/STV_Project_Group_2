name: ipv4_parser

# commands
buggy_cmd: 
  windows: ["./win-ipv4-parser.exe", "--ipstr", "{input}"]
  mac: ["./mac-ipv4-parser", "--ipstr", "{input}"]
buggy_cwd: "../../IPv4-IPv6-parser-main/bin"

reference_cmd:
  windows: ["python", "ipv4_parser.py", "{input}"]
  mac: ["python3", "ipv4_parser.py", "{input}"]
reference_cwd: "../../IPv4-IPv6-parser-main/ipyparse/src"

# input
input_mode: arg
input:
  type: sequence
  separator: "."
  count: 4
  element:
    type: int
    min: 0
    max: 255 
seeds_path: "../inputs/ipv4_parser/seeds.txt"
seed_count: 30

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "invalidity"
  - "bonus"
  - "Traceback (most recent call last)"

# differential output comparison
output_pattern: "Output: [{value}]"

# coverage
coverage_enabled: false
tracking_mode: behavioral
